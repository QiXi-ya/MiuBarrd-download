    <script>
        // 创建动态花瓣
        function createPetals() {
            const container = document.getElementById('petals-container');
            const petalCount = 15;

            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal-fall';

                // 随机大小
                const size = Math.random() * 20 + 10;
                petal.style.width = `${size}px`;
                petal.style.height = `${size}px`;

                // 随机位置
                const left = Math.random() * 100;
                petal.style.left = `${left}vw`;

                // 随机透明度
                const opacity = Math.random() * 0.3 + 0.2;
                petal.style.opacity = opacity;

                // 随机动画时长
                const duration = Math.random() * 10 + 10;
                petal.style.animationDuration = `${duration}s`;

                // 随机延迟
                const delay = Math.random() * 5;
                petal.style.animationDelay = `${delay}s`;

                container.appendChild(petal);
            }
        }

        // 打字动画
        document.addEventListener('DOMContentLoaded', function () {
            // 创建花瓣
            createPetals();

            // 打字内容定义
            const titleText = "MiuBarrd";
            const subtitleTexts = [
                "你好，欢迎使用MiuBarrd 3.0.1。",
                "好久不见。",
                "Hello，MiuBarrd 3.0.1。",
                "幸会。",
                "MiuBarrd 3.0.1 准备好啦。",
                "世界那么大，很高兴遇见你。",
                "更新至3.0.1。",
                "致谢：Cloud，烷基八氮，以及支持MiuBarrd的大家。",
                "欢迎使用MiuBarrd，已更新至3.0.1。",
                "初见如旧雨，重逢似晨星。",
                "倾盖如故，白首如新。",
                "就绪。",
                "我们开始吧。",
                "MiuBarrd 3.0.1，从此开始。"
            ];

            const typedTitle = document.getElementById('typed-title');
            const typedSubtitle = document.getElementById('typed-subtitle');
            const typedDescription = document.getElementById('typed-description');

            let titleIndex = 0;
            let subtitleIndex = 0;
            let currentSubtitle = 0;
            let isDeleting = false;

            // 打字速度
            const typingSpeed = 100;
            const deletingSpeed = 50;
            const pauseTime = 1500;

            // 打字函数
            function typeTitle() {
                if (titleIndex < titleText.length) {
                    typedTitle.textContent += titleText.charAt(titleIndex);
                    titleIndex++;
                    setTimeout(typeTitle, typingSpeed);
                } else {
                    setTimeout(typeSubtitle, 500);
                }
            }

            function typeSubtitle() {
                const currentText = subtitleTexts[currentSubtitle];

                if (!isDeleting && subtitleIndex < currentText.length) {
                    // 打字
                    typedSubtitle.textContent += currentText.charAt(subtitleIndex);
                    subtitleIndex++;
                    setTimeout(typeSubtitle, typingSpeed);
                } else if (isDeleting && subtitleIndex > 0) {
                    // 删除
                    typedSubtitle.textContent = currentText.substring(0, subtitleIndex - 1);
                    subtitleIndex--;
                    setTimeout(typeSubtitle, deletingSpeed);
                } else if (!isDeleting && subtitleIndex === currentText.length) {
                    // 暂停后开始删除
                    isDeleting = true;
                    setTimeout(typeSubtitle, pauseTime);
                } else if (isDeleting && subtitleIndex === 0) {
                    // 删除完成后切换到下一个标题
                    isDeleting = false;
                    currentSubtitle = (currentSubtitle + 1) % subtitleTexts.length;
                    setTimeout(typeSubtitle, 300);
                }
            }

            // 描述文字淡入
            function showDescription() {
                typedDescription.textContent = descriptionText;
                typedDescription.classList.add('visible');
            }

            // 滚动动画
            function checkScroll() {
                const fadeElements = document.querySelectorAll('.fade-in');

                fadeElements.forEach(element => {
                    const elementTop = element.getBoundingClientRect().top;
                    const windowHeight = window.innerHeight;

                    if (elementTop < windowHeight - 100) {
                        element.classList.add('visible');
                    }
                });
            }

            // 解决滚动到达位置不准的问题
            function smoothScrollToTarget(targetId) {
                const targetElement = document.querySelector(targetId);
                if (!targetElement) return;

                const headerHeight = 100; // 根据实际情况调整偏移量
                const targetPosition = targetElement.getBoundingClientRect().top + window.pageYOffset;
                const offsetPosition = targetPosition - headerHeight;

                window.scrollTo({
                    top: offsetPosition,
                    behavior: 'smooth'
                });
            }

            // 启动动画
            setTimeout(typeTitle, 500);

            // 监听滚动
            window.addEventListener('scroll', checkScroll);
            checkScroll(); // 初始检查

            // 下载按钮点击事件
            const downloadBtns = document.querySelectorAll('.btn-download');
            downloadBtns.forEach(btn => {
                btn.addEventListener('click', function (e) {
                    // 如果是下载链接，正常跳转
                    if (this.getAttribute('href').endsWith('.zip')) {
                        console.log('MiuBarrd 下载开始');

                        // 添加下载动画
                        const originalHTML = this.innerHTML;
                        this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在下载...';
                        this.style.opacity = '0.8';

                        // 3秒后恢复
                        setTimeout(() => {
                            this.innerHTML = originalHTML;
                            this.style.opacity = '1';
                        }, 3000);
                    }
                });
            });

            // 为所有内部链接添加精确的平滑滚动
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');

                    if (targetId === '#head') {
                        // 返回顶部
                        window.scrollTo({
                            top: 0,
                            behavior: 'smooth'
                        });
                    } else if (targetId === '#download') {
                        // 精确滚动到下载区域
                        const downloadSection = document.querySelector('#download');
                        if (downloadSection) {
                            const downloadCard = downloadSection.querySelector('.download-card');
                            if (downloadCard) {
                                const downloadCardTop = downloadCard.getBoundingClientRect().top + window.pageYOffset;
                                window.scrollTo({
                                    top: downloadCardTop - 120, // 更大的偏移量确保完全可见
                                    behavior: 'smooth'
                                });
                            }
                        }
                    } else if (targetId === '#about') {
                        // 精确滚动到关于我们区域
                        const footerElement = document.querySelector('footer');
                        if (footerElement) {
                            const footerTop = footerElement.getBoundingClientRect().top + window.pageYOffset;
                            window.scrollTo({
                                top: footerTop - 100,
                                behavior: 'smooth'
                            });
                        }
                    }
                });
            });

            // 添加页面加载时的平滑滚动处理
            if (window.location.hash) {
                setTimeout(() => {
                    const hash = window.location.hash;
                    if (hash === '#download') {
                        const downloadSection = document.querySelector('#download');
                        if (downloadSection) {
                            const downloadCard = downloadSection.querySelector('.download-card');
                            if (downloadCard) {
                                const downloadCardTop = downloadCard.getBoundingClientRect().top + window.pageYOffset;
                                window.scrollTo({
                                    top: downloadCardTop - 120,
                                    behavior: 'smooth'
                                });
                            }
                        }
                    } else if (hash === '#about') {
                        const footerElement = document.querySelector('footer');
                        if (footerElement) {
                            const footerTop = footerElement.getBoundingClientRect().top + window.pageYOffset;
                            window.scrollTo({
                                top: footerTop - 100,
                                behavior: 'smooth'
                            });
                        }
                    }
                }, 100);
            }
        });
    </script>
</body>
